name: Sync matches

on:
  schedule:
    - cron: "*/30 18-23 * * *"
    - cron: "*/30 0-6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync endpoint
        run: |
          curl --fail --show-error --silent "${SYNC_URL}" \
            -H "Authorization: Bearer ${CRON_SECRET}"
        env:
          SYNC_URL: ${{ secrets.SYNC_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
